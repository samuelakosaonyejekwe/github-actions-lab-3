name: Destroy All Environments

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  destroy-demo:
    name: Destroy Demo
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Delete Demo Bucket
        run: |
          # Find and delete any cloudburst-demo-* buckets
          for bucket in $(aws s3api list-buckets --query "Buckets[?starts_with(Name, 'cloudburst-demo-')].Name" --output text); do
            echo "Deleting bucket: $bucket"
            aws s3 rb "s3://$bucket" --force
          done
        continue-on-error: true
  destroy-dev:
    name: Destroy Dev
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Restore Dev State
        uses: actions/cache/restore@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
            .terraform
          key: terraform-state-${{ github.repository }}
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy Dev
        run: terraform destroy -auto-approve -var="environment=dev"
        continue-on-error: true
        
  destroy-staging:
    name: Destroy Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Restore Staging State
        uses: actions/cache/restore@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
            .terraform
          key: terraform-state-staging-${{ github.repository }}
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy Staging
        run: terraform destroy -auto-approve -var="environment=staging"
        continue-on-error: true

  destroy-production:
    name: Destroy Production
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Restore Production State
        uses: actions/cache/restore@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
            .terraform
          key: terraform-state-production-${{ github.repository }}
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy Production
        run: terraform destroy -auto-approve -var="environment=production"
        continue-on-error: true