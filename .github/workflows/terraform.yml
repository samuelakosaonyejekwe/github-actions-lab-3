name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: eu-west-2

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      # ✅ Step 3: Configure AWS Credentials (CRITICAL FIX)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4: Restore Terraform state cache
      - name: Restore Terraform State
        uses: actions/cache/restore@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
            .terraform
          key: terraform-state-${{ github.repository }}

      # Step 5: Format (auto-fix instead of failing)
      - name: Terraform Format
        run: terraform fmt -recursive

      # Step 6: Initialize
      - name: Terraform Init
        run: terraform init

      # Step 7: Validate
      - name: Terraform Validate
        run: terraform validate

      # Step 8: Plan
      - name: Terraform Plan
        run: terraform plan -no-color

      # Step 9: Apply (only on main push)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve

      # Step 10: Save Terraform state
      - name: Save Terraform State
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
            .terraform
          key: terraform-state-${{ github.repository }}